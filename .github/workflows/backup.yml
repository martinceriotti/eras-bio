name: Supabase Backup

on:
  schedule:
    - cron: '0 2 * * *'  # Todos los días a las 2am UTC
  workflow_dispatch:       # Para correrlo manualmente también

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar PostgreSQL 17
        run: |
          sudo apt-get install -y curl ca-certificates
          curl https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Backup
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PGSSLMODE: require
          DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
        run: |
          /usr/lib/postgresql/17/bin/pg_dump "postgresql://postgres.voeojvarvglvaqrojorh@${DB_HOST}:5432/postgres" \
            --no-password \
            -f backup_$(date +%Y%m%d).sql

      - name: Subir backup como artifact
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ github.run_number }}
          path: "*.sql"
          retention-days: 30
