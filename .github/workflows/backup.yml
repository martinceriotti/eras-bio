name: Supabase Backup

on:
  schedule:
    - cron: '0 2 * * *'  # Todos los días a las 2am UTC
  workflow_dispatch:       # Para correrlo manualmente también

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Backup
        run: |
          PGSSLMODE=require pg_dump "postgresql://postgres:[PASSWORD]@db.[REF].supabase.co:5432/postgres" \
          --no-password \
          -f backup_$(date +%Y%m%d).sql
          env:
            PGDATABASE: postgres
      - name: Subir backup como artifact
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ github.run_number }}
          path: "*.sql"
          retention-days: 30
